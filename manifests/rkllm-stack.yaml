---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rkllm-server
  namespace: npu-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rkllm-server
  template:
    metadata:
      labels:
        app: rkllm-server
    spec:
      nodeSelector:
        hardware: npu
      containers:
      - name: rkllm
        image: ubuntu:24.04
        workingDir: /app
        command: ["/bin/bash", "-c"]
        args: 
          - |
            set -e
            
            # 1. Install System Dependencies
            apt-get update && apt-get install -y \
                git python3 python3-pip gcc g++ cmake make libgl1-mesa-glx libgomp1 wget

            # 2. Sync Repository to CephFS
            if [ ! -d "/app/.git" ]; then
                git clone https://github.com /app
            else
                cd /app && git pull
            fi

            # 3. Automated Setup (One-time)
            if [ ! -f "/app/.setup_done" ]; then
                cd /app
                export DEBIAN_FRONTEND=noninteractive
                
                # Install Python requirements globally
                pip3 install --break-system-packages flask requests
                
                # Run the ezrknn-llm install scripts
                bash install.sh || true # Skip kernel driver errors
                
                cd examples/rkllm_server_demo
                bash build_rkllm_server_flask.sh
                
                touch /app/.setup_done
            fi

            # 4. Runtime Configuration
            export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/app/rkllm-runtime/Linux/librkllm_api/aarch64:/usr/lib
            
            # 5. Start Flask Server
            cd /app/examples/rkllm_server_demo/rkllm_server
            python3 flask_server.py --host 0.0.0.0 --port 8000 --rkllm_model_path /app/models/Llama-3.2-3B-Instruct_w8a8_g128_rk3588.rkllm --target_platform rk3588
            
        securityContext:
          privileged: true 
        ports:
        - containerPort: 8000
        volumeMounts:
        - name: code-volume
          mountPath: /app
        - name: dri-device
          mountPath: /dev/dri/renderD129
      volumes:
      - name: code-volume
        persistentVolumeClaim:
          claimName: rkllm-code-pvc
      - name: dri-device
        hostPath:
          path: /dev/dri/renderD129
          type: CharDevice

---
apiVersion: v1
kind: Service
metadata:
  name: rkllm-service
  namespace: npu-server
spec:
  selector:
    app: rkllm-server
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rkllm-ingress
  namespace: npu-server
  annotations:
    kubernetes.io/ingress.class: public 
spec:
  rules:
  - host: rkllm.local 
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: rkllm-service
            port:
              number: 8000

