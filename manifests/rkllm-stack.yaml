---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rkllm-server
  namespace: npu-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rkllm-server
  template:
    metadata:
      labels:
        app: rkllm-server
    spec:
      nodeSelector:
        hardware: npu
      initContainers:
      - name: git-sync
        image: alpine/git
        imagePullPolicy: IfNotPresent
        workingDir: /app
        command: ["/bin/sh", "-c"]
        args:
          - |
            # 1. Clone to a temporary location
            if [ ! -d "/app/.git" ]; then
                echo "Cloning repo to temporary directory..."
                git clone https://github.com/jallen2281/ezrknn-llm.git /tmp/repo
                echo "Moving files to /app (preserving existing models)..."
                # Move everything except the models folder if it exists
                cp -r /tmp/repo/. /app/
            else
                echo "Repo already exists, pulling updates..."
                cd /app && git pull
            fi
        volumeMounts:
        - name: code-volume
          mountPath: /app
      containers:
      - name: rkllm
        image: ubuntu:24.04
        imagePullPolicy: IfNotPresent
        workingDir: /app
        command: ["/bin/bash", "-c"]
        args: 
          - |
            set -e
            # Ubuntu 24.04 package names
            apt-get update && apt-get install -y python3-pip libgl1 libglx-mesa0 libgomp1 cmake gcc g++ sudo
            
            # Python 3.12 requires --break-system-packages
            pip3 install --break-system-packages flask requests
            
            if [ ! -f "/app/examples/rkllm_server_demo/rkllm_server/lib/librkllmrt.so" ]; then
                cd /app/examples/rkllm_server_demo
                mkdir -p build && cd build
                cmake .. -DCMAKE_SYSTEM_NAME=Linux -DCMAKE_SYSTEM_PROCESSOR=aarch64 -DTARGET_PLATFORM=rk3588
                make -j$(nproc)
                cd /app
                touch /app/.setup_done
            fi
            
            # Paths for the RKLLM runtime and your compiled Linux libs
            export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/app/rkllm-runtime/Linux/librkllm_api/aarch64:/app/examples/rkllm_server_demo/build:/usr/lib
            
            cd /app/examples/rkllm_server_demo/rkllm_server
            python3 flask_server.py \
              --rkllm_model_path /app/models/Llama-3.2-3B-Instruct_w8a8_g128_rk3588.rkllm \
              --target_platform rk3588
        securityContext:
          privileged: true 
        ports:
        - containerPort: 8000
        volumeMounts:
        - name: code-volume
          mountPath: /app
        - name: dri-device
          mountPath: /dev/dri/renderD129
      volumes:
      - name: code-volume
        persistentVolumeClaim:
          claimName: rkllm-code-pvc
      - name: dri-device
        hostPath:
          path: /dev/dri/renderD129
          type: CharDevice
      - name: dma-heap # Add this
        hostPath:
          path: /dev/dma_heap

---
apiVersion: v1
kind: Service
metadata:
  name: rkllm-service
  namespace: npu-server
spec:
  selector:
    app: rkllm-server
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rkllm-ingress
  namespace: npu-server
  annotations:
    kubernetes.io/ingress.class: public 
spec:
  rules:
  - host: rkllm.local 
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: rkllm-service
            port:
              number: 8000

